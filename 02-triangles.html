<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>三角形模型 — 动态演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0f1e;color:#e2e8f0;height:100dvh;display:flex;overflow:hidden}
.sidebar{width:290px;min-width:290px;background:#111827;border-right:1px solid #1e293b;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;font-size:.85em;z-index:2}
.sidebar h3{font-size:.85em;color:#60a5fa;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.tab-btn{padding:10px 12px;background:#1a2332;border:1px solid #2a3548;color:#cbd5e1;border-radius:8px;cursor:pointer;font-size:.82em;text-align:left;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab-btn:active{background:#2563eb}
.tab-btn.active{background:linear-gradient(135deg,#1d4ed8,#2563eb);border-color:#3b82f6;color:#fff}
.ctrl{background:#1a2332;border-radius:8px;padding:10px;border:1px solid #2a3548}
.ctrl input[type=range]{width:100%;accent-color:#60a5fa}
.info-box{background:#1a2332;border-radius:8px;padding:10px;font-size:.74em;line-height:1.7;color:#94a3b8;border:1px solid #2a3548}
.info-box b{color:#f1f5f9}.info-box .hl{color:#fbbf24;font-weight:bold}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0f172a 0%,#0a0f1e 100%);overflow:hidden;min-width:0}
canvas{display:block;max-width:100%;max-height:100%;border-radius:6px}
.back-link{color:#60a5fa;text-decoration:none;font-size:.8em;display:flex;align-items:center;gap:3px}
.vd{color:#60a5fa;font-weight:bold}
.mobile-tabs{display:none}.mobile-panel{display:none}
@media(max-width:768px){
  body{flex-direction:column}
  .sidebar{display:none}
  .canvas-wrap{flex:1;min-height:0;order:1}
  .mobile-tabs{display:flex;order:2;gap:4px;padding:6px;background:#111827;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
  .mobile-tabs .tab-btn{flex-shrink:0;white-space:nowrap;font-size:.72em;padding:7px 9px}
  .mobile-panel{display:block;order:3;background:#111827;border-top:1px solid #1e293b;padding:8px 10px;max-height:35vh;overflow-y:auto;flex-shrink:0}
  .mobile-panel.collapsed{max-height:0;padding:0;overflow:hidden}
  .panel-toggle{display:flex;align-items:center;justify-content:center;gap:4px;padding:7px;background:#1a2332;color:#94a3b8;border:none;width:100%;font-size:.78em;cursor:pointer;order:4;flex-shrink:0}
}
@media(min-width:769px){.panel-toggle{display:none}}
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="canvas-wrap"><canvas id="canvas"></canvas></div>
<div class="mobile-tabs" id="mobileTabs"></div>
<div class="mobile-panel" id="mobilePanel"></div>
<button class="panel-toggle" id="panelToggle" onclick="togglePanel()">⚙ 速度控制</button>

<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const DESIGN_W=750,DESIGN_H=600;canvas.width=DESIGN_W;canvas.height=DESIGN_H;
let currentModel='handshake',time=0,speed=1;const trails=[];
let panelOpen=true;
function togglePanel(){panelOpen=!panelOpen;document.getElementById('mobilePanel').classList.toggle('collapsed',!panelOpen);document.getElementById('panelToggle').textContent=panelOpen?'⚙ 速度控制':'⚙ 速度控制 ▸'}
function resizeCanvas(){const w=canvas.parentElement,sw=Math.min((w.clientWidth-8)/DESIGN_W,(w.clientHeight-8)/DESIGN_H);canvas.style.width=(DESIGN_W*sw)+'px';canvas.style.height=(DESIGN_H*sw)+'px'}
window.addEventListener('resize',resizeCanvas);
function addTrail(x,y){trails.push({x,y,life:1});if(trails.length>60)trails.shift()}
function drawTrails(){for(let t of trails){ctx.beginPath();ctx.arc(t.x,t.y,2.5,0,Math.PI*2);ctx.fillStyle=`rgba(251,191,36,${t.life*0.5})`;ctx.fill();t.life-=0.025}for(let i=trails.length-1;i>=0;i--)if(trails[i].life<=0)trails.splice(i,1)}
function glowPt(x,y,r,color){for(let i=3;i>=0;i--){ctx.beginPath();ctx.arc(x,y,r+i*5,0,Math.PI*2);ctx.fillStyle=color.replace('1',(0.12-i*0.025).toString());ctx.fill()}}
function dp(x,y,r,color,label,glow=false){if(glow)glowPt(x,y,r,color);ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();if(label){ctx.fillStyle='#f1f5f9';ctx.font='bold 13px sans-serif';ctx.fillText(label,x+10,y-10)}}
function dl(x1,y1,x2,y2,color,width=2,dashed=false){if(dashed)ctx.setLineDash([8,5]);else ctx.setLineDash([]);ctx.strokeStyle=color;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.setLineDash([])}
function fillTri(a,b,c,color){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(c.x,c.y);ctx.closePath();ctx.fill()}
function angArc(v,p1,p2,color,size=28){let a1=Math.atan2(p1.y-v.y,p1.x-v.x),a2=Math.atan2(p2.y-v.y,p2.x-v.x);ctx.beginPath();ctx.arc(v.x,v.y,size,a1,a2);ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke()}

function renderHandshake(){
  ctx.clearRect(0,0,DESIGN_W,DESIGN_H);let O={x:330,y:380},lenA=155,lenB=135,baseAngle=-0.65,rotAng=0.7+Math.sin(time*0.5*speed)*0.45;
  let A={x:O.x+lenA*Math.cos(baseAngle),y:O.y+lenA*Math.sin(baseAngle)},B={x:O.x+lenB*Math.cos(baseAngle+0.7),y:O.y+lenB*Math.sin(baseAngle+0.7)};
  let cos=Math.cos(rotAng),sin=Math.sin(rotAng);
  function rot(p){let dx=p.x-O.x,dy=p.y-O.y;return{x:O.x+dx*cos-dy*sin,y:O.y+dx*sin+dy*cos}}
  let A2=rot(A),B2=rot(B);addTrail(A2.x,A2.y);drawTrails();
  fillTri(O,A,B,'rgba(96,165,250,0.12)');fillTri(O,A2,B2,'rgba(244,114,182,0.12)');
  dl(O.x,O.y,A.x,A.y,'#60a5fa',3.5);dl(O.x,O.y,B.x,B.y,'#60a5fa',3);dl(A.x,A.y,B.x,B.y,'#60a5fa',2.5);
  dl(O.x,O.y,A2.x,A2.y,'#f472b6',3.5);dl(O.x,O.y,B2.x,B2.y,'#f472b6',3);dl(A2.x,A2.y,B2.x,B2.y,'#f472b6',2.5);
  dl(A.x,A.y,A2.x,A2.y,'#fbbf24',2.5,true);dl(B.x,B.y,B2.x,B2.y,'#34d399',2.5,true);
  ctx.beginPath();ctx.arc(O.x,O.y,65,baseAngle,baseAngle+rotAng);ctx.strokeStyle='#f8fafc';ctx.lineWidth=2.5;ctx.stroke();
  let dg=(rotAng*180/Math.PI).toFixed(1);ctx.fillStyle='#f8fafc';ctx.font='bold 13px sans-serif';ctx.fillText(`${dg}°`,O.x+50*Math.cos(baseAngle+rotAng/2),O.y+50*Math.sin(baseAngle+rotAng/2)-12);
  dp(O.x,O.y,6,'#f8fafc','O');dp(A.x,A.y,5,'#60a5fa','A');dp(B.x,B.y,5,'#60a5fa','B');dp(A2.x,A2.y,6,'#f472b6',"A'",true);dp(B2.x,B2.y,5,'#f472b6',"B'");
  angArc(O,A,B,'#60a5fa',24);angArc(O,A2,B2,'#f472b6',24);
  ctx.fillStyle='#f1f5f9';ctx.font='bold 15px sans-serif';ctx.fillText('手拉手模型',20,28);ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('△OAB绕O旋转 → △OA\'B\'',20,46);ctx.fillText('→ △OAB ≅ △OA\'B\'（全等）',20,64);
}

function renderThreeLine(){
  ctx.clearRect(0,0,DESIGN_W,DESIGN_H);let baseY=420;dl(30,baseY,DESIGN_W-30,baseY,'#475569',3);
  let pos=[150,340,530],angs=[],lens=[170,210,150],tops=[],bases=[];
  for(let i=0;i<3;i++){angs[i]=62+Math.sin(time*0.7*speed+i*1.3)*15;let rad=angs[i]*Math.PI/180,p={x:pos[i],y:baseY};bases.push(p);let top={x:p.x-Math.cos(rad)*lens[i],y:p.y-Math.sin(rad)*lens[i]};tops.push(top);dl(p.x,p.y,top.x,top.y,i===1?'#f472b6':'#60a5fa',3.5);angArc(p,{x:p.x+40,y:p.y},top,'#fbbf24',22);ctx.fillStyle='#fbbf24';ctx.font='11px sans-serif';ctx.fillText(`${angs[i].toFixed(0)}°`,p.x+15,p.y-14)}
  dl(tops[0].x,tops[0].y,tops[1].x,tops[1].y,'#f472b6',2,true);dl(tops[1].x,tops[1].y,tops[2].x,tops[2].y,'#f472b6',2,true);dl(tops[0].x,tops[0].y,tops[2].x,tops[2].y,'#34d399',2,true);
  fillTri(tops[0],bases[0],tops[1],'rgba(96,165,250,0.08)');fillTri(tops[1],bases[1],tops[2],'rgba(244,114,182,0.08)');
  for(let i=0;i<3;i++){dp(bases[i].x,bases[i].y,5,'#f8fafc','P'+(i+1));dp(tops[i].x,tops[i].y,5,i===1?'#f472b6':'#60a5fa','Q'+(i+1))}
  ctx.fillStyle='#f1f5f9';ctx.font='bold 15px sans-serif';ctx.fillText('一线三等角',20,28);ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('直线上3个等角→两组相似△',20,46);
}

function renderAShape(){
  ctx.clearRect(0,0,DESIGN_W,DESIGN_H);let top={x:375,y:80},bL={x:150,y:490},bR={x:600,y:490};
  dl(top.x,top.y,bL.x,bL.y,'#60a5fa',3.5);dl(top.x,top.y,bR.x,bR.y,'#60a5fa',3.5);dl(bL.x,bL.y,bR.x,bR.y,'#475569',2.5);
  let t=0.22+Math.sin(time*0.55*speed)*0.22,ML={x:top.x+(bL.x-top.x)*t,y:top.y+(bL.y-top.y)*t},MR={x:top.x+(bR.x-top.x)*t,y:top.y+(bR.y-top.y)*t};
  dl(ML.x,ML.y,MR.x,MR.y,'#f472b6',3.5);fillTri(top,ML,MR,'rgba(244,114,182,0.08)');
  dp(top.x,top.y,6,'#f8fafc','A');dp(bL.x,bL.y,5,'#60a5fa','B');dp(bR.x,bR.y,5,'#60a5fa','C');dp(ML.x,ML.y,5,'#f472b6','D',true);dp(MR.x,MR.y,5,'#f472b6','E',true);
  ctx.fillStyle='#f1f5f9';ctx.font='bold 15px sans-serif';ctx.fillText('A字型相似',20,28);ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('DE//BC → △ADE∽△ABC',20,46);ctx.fillText(`AD/AB≈${t.toFixed(2)}`,20,62);
}

function renderXShape(){
  ctx.clearRect(0,0,DESIGN_W,DESIGN_H);let T={x:375,y:48},B={x:375+Math.sin(time*0.45*speed)*55,y:530},L={x:100,y:195},R={x:650,y:330};
  dl(T.x,T.y,B.x,B.y,'#60a5fa',3.5);dl(L.x,L.y,R.x,R.y,'#f472b6',3.5);
  let den=(T.x-B.x)*(L.y-R.y)-(T.y-B.y)*(L.x-R.x),tn=(T.x-L.x)*(L.y-R.y)-(T.y-L.y)*(L.x-R.x),tt=den!==0?tn/den:0.5;
  let IX={x:T.x+tt*(B.x-T.x),y:T.y+tt*(B.y-T.y)};fillTri(T,IX,L,'rgba(96,165,250,0.1)');fillTri(B,IX,R,'rgba(244,114,182,0.1)');
  dp(T.x,T.y,5,'#60a5fa','A');dp(B.x,B.y,5,'#60a5fa','B');dp(L.x,L.y,5,'#f472b6','C');dp(R.x,R.y,5,'#f472b6','D');dp(IX.x,IX.y,6,'#fbbf24','O',true);
  ctx.fillStyle='#f1f5f9';ctx.font='bold 15px sans-serif';ctx.fillText('X字型相似(8字型)',20,28);ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('AB与CD交于O→△AOC∽△BOD',20,46);
}

function renderMidline(){
  ctx.clearRect(0,0,DESIGN_W,DESIGN_H);let A={x:375,y:85},B={x:190+Math.sin(time*0.4*speed)*30,y:465},C={x:560+Math.sin(time*0.4*speed+1)*30,y:465};
  dl(A.x,A.y,B.x,B.y,'#60a5fa',3.5);dl(A.x,A.y,C.x,C.y,'#60a5fa',3.5);dl(B.x,B.y,C.x,C.y,'#475569',2.5);
  let M={x:(B.x+C.x)/2,y:(B.y+C.y)/2};dl(A.x,A.y,M.x,M.y,'#fbbf24',3);
  let D={x:2*M.x-A.x,y:2*M.y-A.y},pulse=Math.sin(time*1.8*speed)*0.25+0.75;
  dl(M.x,M.y,D.x,D.y,'#f472b6',2.5,true);
  if(pulse>0.9){dl(B.x,B.y,D.x,D.y,'#34d399',2.5);dl(C.x,C.y,D.x,D.y,'#34d399',2.5);fillTri(A,B,D,'rgba(52,211,153,0.06)');ctx.fillStyle='#34d399';ctx.font='bold 13px sans-serif';ctx.fillText('平行四边形ABDC',310,430)}
  dp(A.x,A.y,5,'#f8fafc','A');dp(B.x,B.y,5,'#60a5fa','B');dp(C.x,C.y,5,'#60a5fa','C');dp(M.x,M.y,5,'#fbbf24','M',true);dp(D.x,D.y,5,'#f472b6','D');
  ctx.fillStyle='#f1f5f9';ctx.font='bold 15px sans-serif';ctx.fillText('倍长中线法',20,28);ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('AM是中线→延长至D使MD=AM',20,46);
}

function render(){switch(currentModel){case'handshake':renderHandshake();break;case'threeline':renderThreeLine();break;case'ashape':renderAShape();break;case'xshape':renderXShape();break;case'midline':renderMidline();break}}

function buildUI(){
  let models=[{id:'handshake',n:'🤝 手拉手',sn:'手拉手'},{id:'threeline',n:'📏 一线三等角',sn:'一线三等角'},{id:'ashape',n:'🔺 A字型相似',sn:'A字相似'},{id:'xshape',n:'✖ X字型相似',sn:'X字相似'},{id:'midline',n:'📐 倍长中线',sn:'倍长中线'}];
  let st='<a href="index.html" class="back-link">← 返回首页</a><div style="display:flex;flex-direction:column;gap:4px">';
  models.forEach(m=>{st+=`<button class="tab-btn ${currentModel===m.id?'active':''}" data-m="${m.id}">${m.n}</button>`});
  st+=`</div><div class="ctrl"><h3>⚡ 动画速度</h3><input type="range" min="0.2" max="3" step="0.1" value="${speed}" id="ss"><span style="font-size:.72em;color:#64748b"><span class="vd" id="sv">${speed.toFixed(1)}x</span></span></div>`;
  let infos={handshake:'两个共顶点△→<span class="hl">旋转全等</span><br>🖱 桌面端可拖动',threeline:'直线上3个等角→<span class="hl">两组相似△</span>',ashape:'平行截线→<span class="hl">△ADE∽△ABC</span>',xshape:'交叉线段→<span class="hl">对顶角相似</span>',midline:'中线延长→<span class="hl">平行四边形</span>'};
  st+=`<div class="info-box"><b>${models.find(m=>m.id===currentModel).n}</b><br>${infos[currentModel]}</div>`;
  document.getElementById('sidebar').innerHTML=st;
  let mt='';models.forEach(m=>{mt+=`<button class="tab-btn ${currentModel===m.id?'active':''}" data-m="${m.id}">${m.sn}</button>`});
  document.getElementById('mobileTabs').innerHTML=mt;document.getElementById('mobilePanel').innerHTML=st;
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{currentModel=b.dataset.m;trails.length=0;buildUI();render()}));
  document.getElementById('ss').addEventListener('input',e=>{speed=+e.target.value;document.getElementById('sv').textContent=speed.toFixed(1)});
}
resizeCanvas();buildUI();render();
function animate(ts){time=ts/1000;render();requestAnimationFrame(animate)}requestAnimationFrame(animate);
</script>
</body>
</html>
