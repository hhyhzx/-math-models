<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>函数模型 — 动态演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0f1e;color:#e2e8f0;height:100dvh;display:flex;overflow:hidden}
.sidebar{width:290px;min-width:290px;background:#111827;border-right:1px solid #1e293b;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;font-size:.85em;z-index:2}
.sidebar h3{font-size:.85em;color:#60a5fa;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.tab-btn{padding:10px 12px;background:#1a2332;border:1px solid #2a3548;color:#cbd5e1;border-radius:8px;cursor:pointer;font-size:.82em;text-align:left;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab-btn:active{background:#2563eb}
.tab-btn.active{background:linear-gradient(135deg,#1d4ed8,#2563eb);border-color:#3b82f6;color:#fff}
.ctrl{background:#1a2332;border-radius:8px;padding:10px;border:1px solid #2a3548}
.ctrl label{display:flex;justify-content:space-between;align-items:center;font-size:.76em;color:#94a3b8;margin-bottom:2px}
.ctrl input[type=range]{width:100%;accent-color:#60a5fa;margin-bottom:5px}
.info-box{background:#1a2332;border-radius:8px;padding:10px;font-size:.74em;line-height:1.7;color:#94a3b8;border:1px solid #2a3548}
.info-box b{color:#f1f5f9}.info-box .hl{color:#fbbf24;font-weight:bold}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0f172a 0%,#0a0f1e 100%);overflow:hidden;min-width:0}
canvas{display:block;max-width:100%;max-height:100%;border-radius:6px}
.back-link{color:#60a5fa;text-decoration:none;font-size:.8em;display:flex;align-items:center;gap:3px}
.vd{color:#60a5fa;font-weight:bold}
/* Mobile */
.mobile-tabs{display:none}
.mobile-panel{display:none}
@media(max-width:768px){
  body{flex-direction:column}
  .sidebar{display:none}
  .canvas-wrap{flex:1;min-height:0;order:1}
  .mobile-tabs{display:flex;order:2;gap:4px;padding:6px;background:#111827;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
  .mobile-tabs .tab-btn{flex-shrink:0;white-space:nowrap;font-size:.75em;padding:8px 10px}
  .mobile-panel{display:block;order:3;background:#111827;border-top:1px solid #1e293b;padding:8px 10px;max-height:35vh;overflow-y:auto;flex-shrink:0}
  .mobile-panel.collapsed{max-height:0;padding:0;overflow:hidden}
  .panel-toggle{display:flex;align-items:center;justify-content:center;gap:4px;padding:7px;background:#1a2332;color:#94a3b8;border:none;width:100%;font-size:.78em;cursor:pointer;order:4;flex-shrink:0}
}
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="canvas-wrap"><canvas id="canvas"></canvas></div>
<div class="mobile-tabs" id="mobileTabs"></div>
<div class="mobile-panel" id="mobilePanel"></div>
<button class="panel-toggle" id="panelToggle" onclick="togglePanel()">⚙ 参数控制</button>

<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const DESIGN_W=750,DESIGN_H=600;
canvas.width=DESIGN_W;canvas.height=DESIGN_H;
let currentModel='linear',time=0,speed=1;
let params={k:1.5,b:1,a:1,B:-2,c:-3,K:3};
const trails=[];
let panelOpen=true;

function togglePanel(){panelOpen=!panelOpen;document.getElementById('mobilePanel').classList.toggle('collapsed',!panelOpen);document.getElementById('panelToggle').textContent=panelOpen?'⚙ 参数控制':'⚙ 参数控制 ▸'}

function resizeCanvas(){
  const wrap=canvas.parentElement;
  const maxW=wrap.clientWidth-8,maxH=wrap.clientHeight-8;
  const s=Math.min(maxW/DESIGN_W,maxH/DESIGN_H);
  canvas.style.width=(DESIGN_W*s)+'px';canvas.style.height=(DESIGN_H*s)+'px';
}
window.addEventListener('resize',resizeCanvas);

const OX=DESIGN_W/2,OY=DESIGN_H/2,SCALE=55;
function tx(x){return OX+x*SCALE}
function ty(y){return OY-y*SCALE}

function drawGrid(){
  ctx.strokeStyle='#1e293b';ctx.lineWidth=1;
  for(let x=-10;x<=10;x++){ctx.beginPath();ctx.moveTo(tx(x),0);ctx.lineTo(tx(x),DESIGN_H);ctx.stroke()}
  for(let y=-9;y<=9;y++){ctx.beginPath();ctx.moveTo(0,ty(y));ctx.lineTo(DESIGN_W,ty(y));ctx.stroke()}
  ctx.strokeStyle='#334155';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,OY);ctx.lineTo(DESIGN_W,OY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(OX,0);ctx.lineTo(OX,DESIGN_H);ctx.stroke();
  ctx.fillStyle='#475569';ctx.font='11px sans-serif';
  for(let x=-9;x<=9;x++)if(x!==0)ctx.fillText(x,tx(x)-8,OY+16);
  for(let y=-7;y<=7;y++)if(y!==0)ctx.fillText(y,OX+5,ty(y)+4);
  ctx.fillText('O',OX+4,OY+16);
}
function glow(x,y,r,color,alpha){
  for(let i=3;i>=0;i--){ctx.beginPath();ctx.arc(tx(x),ty(y),r+i*4,0,Math.PI*2);ctx.fillStyle=color.replace('1',(alpha*(0.15-i*0.03)).toString());ctx.fill()}
}
function dot(x,y,color,r=5,label='',glowOn=false){
  if(glowOn)glow(x,y,r,color,1);
  ctx.beginPath();ctx.arc(tx(x),ty(y),r,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  if(label){ctx.fillStyle='#f1f5f9';ctx.font='bold 13px sans-serif';ctx.fillText(label,tx(x)+8,ty(y)-8)}
}
function drawLine(x1,y1,x2,y2,color,width=2,dashed=false){
  if(dashed)ctx.setLineDash([8,5]);else ctx.setLineDash([]);
  ctx.strokeStyle=color;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(tx(x1),ty(y1));ctx.lineTo(tx(x2),ty(y2));ctx.stroke();ctx.setLineDash([]);
}
function addTrail(x,y){trails.push({x,y,life:1});if(trails.length>50)trails.shift()}
function drawTrails(){
  for(let t of trails){ctx.beginPath();ctx.arc(tx(t.x),ty(t.y),3,0,Math.PI*2);ctx.fillStyle=`rgba(251,191,36,${t.life*0.6})`;ctx.fill();t.life-=0.03}
  for(let i=trails.length-1;i>=0;i--)if(trails[i].life<=0)trails.splice(i,1);
}

function renderLinear(){
  drawGrid();const{k,b}=params;
  ctx.strokeStyle='#60a5fa';ctx.lineWidth=3.5;
  ctx.beginPath();let f=true;
  for(let px=0;px<DESIGN_W;px++){let mx=(px-OX)/SCALE,my=k*mx+b,py=ty(my);if(f){ctx.moveTo(px,py);f=false}else ctx.lineTo(px,py)}
  ctx.stroke();
  let phase=time*0.5*speed,xp=(phase%6)-3;if(xp<-2.8||xp>2.8)trails.length=0;
  let yp=k*xp+b;addTrail(xp,yp);drawTrails();
  let pulse=Math.sin(time*3*speed)*0.4+0.6;
  dot(xp,yp,'#fbbf24',6+pulse*3,'P',true);
  drawLine(xp,yp,xp+1,yp,'#f59e0b',2);drawLine(xp+1,yp,xp+1,yp+k,'#f59e0b',2);
  ctx.fillStyle='#f59e0b';ctx.font='bold 12px sans-serif';ctx.fillText('1',tx(xp+0.3),ty(yp)+20);ctx.fillText(`${k}`,tx(xp+1)+6,ty(yp+k/2)+4);
  if(k!==0)dot(-b/k,0,'#34d399',5,`(${(-b/k).toFixed(1)},0)`);
  dot(0,b,'#a78bfa',5,`(0,${b})`);
  ctx.fillStyle='#f1f5f9';ctx.font='bold 16px sans-serif';ctx.fillText(`y = ${k.toFixed(1)}x ${b>=0?'+':''}${b}`,20,30);
  ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText(`斜率k=${k} → ${k>0?'↗上升':'↘下降'}，|k|越大越陡`,20,48);
  ctx.fillText(`截距b=${b} → 与y轴交于(0,${b})`,20,65);
  ctx.fillText('✨ 黄点留痕迹，Δy/Δx始终=k',20,86);
}

function renderQuadratic(){
  drawGrid();const{a,B,c}=params;let b=B;
  ctx.strokeStyle='#60a5fa';ctx.lineWidth=3.5;
  ctx.beginPath();let f=true;
  for(let px=0;px<DESIGN_W;px++){let mx=(px-OX)/SCALE,my=a*mx*mx+b*mx+c,py=ty(my);if(f){ctx.moveTo(px,py);f=false}else ctx.lineTo(px,py)}
  ctx.stroke();
  let vx=-b/(2*a),vy=a*vx*vx+b*vx+c;
  let pA=Math.sin(time*2*speed)*0.35+0.65;
  ctx.strokeStyle=`rgba(167,139,250,${pA})`;ctx.lineWidth=2.5;ctx.setLineDash([10,6]);
  ctx.beginPath();ctx.moveTo(tx(vx),0);ctx.lineTo(tx(vx),DESIGN_H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#a78bfa';ctx.font='bold 13px sans-serif';ctx.fillText(`对称轴 x=${vx.toFixed(1)}`,tx(vx)+8,35);
  let phase=time*speed,offset=((phase%5)/5)*2.8,direction=Math.floor(phase/5)%2;
  if(direction===1)offset=2.8-offset;
  let px1=vx+offset,py1=a*px1*px1+b*px1+c,px2=vx-offset,py2=a*px2*px2+b*px2+c;
  addTrail(px1,py1);addTrail(px2,py2);drawTrails();
  let p1=Math.sin(time*3*speed)*0.4+0.6;
  dot(px1,py1,'#fbbf24',5+p1*2,'');dot(px2,py2,'#fbbf24',5+p1*2,'');
  drawLine(px1,py1,px2,py2,'#fbbf24',1.5,true);
  glow(vx,vy,8,'#f472b6',1);dot(vx,vy,'#f472b6',8,`顶点(${vx.toFixed(1)},${vy.toFixed(1)})`);
  let disc=b*b-4*a*c;
  ctx.fillStyle='#f1f5f9';ctx.font='bold 16px sans-serif';ctx.fillText(`y = ${a}x² ${b>=0?'+':''}${b}x ${c>=0?'+':''}${c}`,20,30);
  ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText(`a=${a}→开口${a>0?'向上':'向下'}，|a|越大越窄`,20,48);
  if(disc>0.01){
    let r1=(-b-Math.sqrt(disc))/(2*a),r2=(-b+Math.sqrt(disc))/(2*a);
    dot(r1,0,'#34d399',6,`x₁=${r1.toFixed(1)}`);dot(r2,0,'#34d399',6,`x₂=${r2.toFixed(1)}`);
  }else if(Math.abs(disc)<0.05){dot(vx,0,'#34d399',6,'相切')}
  ctx.fillText('✨ 两黄点关于对称轴对称，距离相等',20,68);
}

function renderInverse(){
  drawGrid();const k=params.K;
  ctx.strokeStyle='#60a5fa';ctx.lineWidth=3.5;
  [1,-1].forEach(sign=>{
    ctx.beginPath();let f=true;
    for(let px=0;px<DESIGN_W;px++){
      let mx=(px-OX)/SCALE;if(sign>0&&mx<0.08||sign<0&&mx>-0.08)continue;
      if(mx>9||mx<-9){f=true;continue}
      let my=k/mx,py=ty(my);if(py<-80||py>DESIGN_H+80){f=true;continue}
      if(f){ctx.moveTo(px,py);f=false}else ctx.lineTo(px,py)
    }
    ctx.stroke();
  });
  let xp=2.5+Math.sin(time*0.7*speed)*1.8;if(xp<0.2)xp=0.2;let yp=k/xp;
  addTrail(xp,yp);drawTrails();
  let pulse=Math.sin(time*3*speed)*0.4+0.6;
  dot(xp,yp,'#fbbf24',6+pulse*2,'P',true);
  let ra=Math.sin(time*2*speed)*0.15+0.2,rx=tx(0),ry=ty(yp),rw=tx(xp)-tx(0),rh=ty(0)-ty(yp);
  ctx.fillStyle=`rgba(251,191,36,${ra})`;ctx.fillRect(rx,Math.min(ry,ty(0)),rw,Math.abs(rh));
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.strokeRect(rx,Math.min(ry,ty(0)),rw,Math.abs(rh));ctx.setLineDash([]);
  ctx.fillStyle='#fbbf24';ctx.font='bold 14px sans-serif';ctx.fillText(`x·y=${xp.toFixed(1)}×${yp.toFixed(1)}=${k}`,tx(xp/2),ty(yp)-18);
  ctx.fillStyle='#f1f5f9';ctx.font='bold 16px sans-serif';ctx.fillText(`y = ${k} / x`,20,30);
  ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText(`k(${k>0?'正':'负'})→${k>0?'一三':'二四'}象限`,20,46);
  ctx.fillText('✨ 黄色矩形面积始终=|k|',20,62);
}

function render(){
  ctx.clearRect(0,0,DESIGN_W,DESIGN_H);
  if(currentModel==='linear')renderLinear();else if(currentModel==='quadratic')renderQuadratic();else renderInverse();
}

function buildUI(){
  let sidetml=`<a href="index.html" class="back-link">← 返回首页</a>`;
  sidetml+=`<div style="display:flex;flex-direction:column;gap:6px">
    <button class="tab-btn ${currentModel==='linear'?'active':''}" data-m="linear">📈 一次函数 · 动点+斜率</button>
    <button class="tab-btn ${currentModel==='quadratic'?'active':''}" data-m="quadratic">📉 二次函数 · 对称跳动</button>
    <button class="tab-btn ${currentModel==='inverse'?'active':''}" data-m="inverse">〰️ 反比例 · 定值演示</button>
  </div>`;
  sidetml+=`<div class="ctrl"><h3>⚡ 动画速度</h3><input type="range" min="0.2" max="3" step="0.1" value="${speed}" id="speedS"><span style="font-size:.72em;color:#64748b"><span class="vd" id="speedV">${speed.toFixed(1)}x</span></span></div>`;
  if(currentModel==='linear'){
    sidetml+=`<div class="ctrl"><h3>📐 参数</h3><label>k <span class="vd" id="kv">${params.k.toFixed(1)}</span></label><input type="range" min="-4" max="4" step="0.1" value="${params.k}" id="ks"><label>b <span class="vd" id="bv">${params.b.toFixed(1)}</span></label><input type="range" min="-4" max="4" step="0.1" value="${params.b}" id="bs"></div>`;
    sidetml+=`<div class="info-box"><b>👀 观察</b><br>🟡 黄点沿直线<span class="hl">留金色轨迹</span><br>📐 橙色△随动点移动<br>🔑 <span class="hl">Δy/Δx始终=k</span></div>`;
  }else if(currentModel==='quadratic'){
    sidetml+=`<div class="ctrl"><h3>📐 参数</h3><label>a <span class="vd" id="av">${params.a.toFixed(1)}</span></label><input type="range" min="-3" max="3" step="0.1" value="${params.a}" id="as"><label>b <span class="vd" id="Bv">${params.B.toFixed(1)}</span></label><input type="range" min="-5" max="5" step="0.1" value="${params.B}" id="Bs"><label>c <span class="vd" id="cv">${params.c.toFixed(1)}</span></label><input type="range" min="-5" max="5" step="0.1" value="${params.c}" id="cs"></div>`;
    sidetml+=`<div class="info-box"><b>👀 观察</b><br>🟡 两黄点<span class="hl">关于对称轴对称</span><br>🔮 对称轴脉动发光<br>📌 顶点是最高/最低点</div>`;
  }else{
    sidetml+=`<div class="ctrl"><h3>📐 参数</h3><label>k <span class="vd" id="Kv">${params.K.toFixed(1)}</span></label><input type="range" min="-6" max="6" step="0.1" value="${params.K}" id="Ks"></div>`;
    sidetml+=`<div class="info-box"><b>👀 观察</b><br>🟡 黄点沿曲线<span class="hl">留轨迹</span><br>📦 矩形面积<span class="hl">始终=|k|</span><br>📌 x·y=k（定值）</div>`;
  }
  document.getElementById('sidebar').innerHTML=sidetml;
  // Mobile tabs
  let mt='';
  ['linear','quadratic','inverse'].forEach(m=>{mt+=`<button class="tab-btn ${currentModel===m?'active':''}" data-m="${m}">${m==='linear'?'📈 一次':m==='quadratic'?'📉 二次':'〰️ 反比例'}</button>`});
  document.getElementById('mobileTabs').innerHTML=mt;
  // Mobile panel: same controls as sidebar
  document.getElementById('mobilePanel').innerHTML=sidetml;

  function bindEvents(){
    document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{currentModel=b.dataset.m;trails.length=0;buildUI();render()}));
    document.getElementById('speedS').addEventListener('input',e=>{speed=+e.target.value;document.getElementById('speedV').textContent=speed.toFixed(1)});
    if(currentModel==='linear'){
      document.getElementById('ks').addEventListener('input',e=>{params.k=+e.target.value;document.getElementById('kv').textContent=params.k.toFixed(1);trails.length=0});
      document.getElementById('bs').addEventListener('input',e=>{params.b=+e.target.value;document.getElementById('bv').textContent=params.b.toFixed(1);trails.length=0});
    }else if(currentModel==='quadratic'){
      document.getElementById('as').addEventListener('input',e=>{params.a=+e.target.value;document.getElementById('av').textContent=params.a.toFixed(1);trails.length=0});
      document.getElementById('Bs').addEventListener('input',e=>{params.B=+e.target.value;document.getElementById('Bv').textContent=params.B.toFixed(1);trails.length=0});
      document.getElementById('cs').addEventListener('input',e=>{params.c=+e.target.value;document.getElementById('cv').textContent=params.c.toFixed(1);trails.length=0});
    }else{
      document.getElementById('Ks').addEventListener('input',e=>{params.K=+e.target.value;document.getElementById('Kv').textContent=params.K.toFixed(1);trails.length=0});
    }
  }
  bindEvents();
}

resizeCanvas();buildUI();render();
function animate(ts){time=ts/1000;render();requestAnimationFrame(animate)}
requestAnimationFrame(animate);
</script>
</body>
</html>
