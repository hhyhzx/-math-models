<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>特殊模型 — 动态演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0f1e;color:#e2e8f0;height:100dvh;display:flex;overflow:hidden}
.sidebar{width:290px;min-width:290px;background:#111827;border-right:1px solid #1e293b;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;font-size:.85em;z-index:2}
.tab-btn{padding:10px 12px;background:#1a2332;border:1px solid #2a3548;color:#cbd5e1;border-radius:8px;cursor:pointer;font-size:.82em;text-align:left;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab-btn:active{background:#2563eb}
.tab-btn.active{background:linear-gradient(135deg,#1d4ed8,#2563eb);border-color:#3b82f6;color:#fff}
.ctrl{background:#1a2332;border-radius:8px;padding:10px;border:1px solid #2a3548}
.ctrl input[type=range]{width:100%;accent-color:#60a5fa}
.info-box{background:#1a2332;border-radius:8px;padding:10px;font-size:.74em;line-height:1.7;color:#94a3b8;border:1px solid #2a3548}
.info-box b{color:#f1f5f9}.info-box .hl{color:#fbbf24;font-weight:bold}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0f172a 0%,#0a0f1e 100%);overflow:hidden;min-width:0}
canvas{display:block;max-width:100%;max-height:100%;border-radius:6px}
.back-link{color:#60a5fa;text-decoration:none;font-size:.8em;display:flex;align-items:center;gap:3px}
.vd{color:#60a5fa;font-weight:bold}
.mobile-tabs{display:none}.mobile-panel{display:none}
@media(max-width:768px){
  body{flex-direction:column}.sidebar{display:none}
  .canvas-wrap{flex:1;min-height:0;order:1}
  .mobile-tabs{display:flex;order:2;gap:4px;padding:6px;background:#111827;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
  .mobile-tabs .tab-btn{flex-shrink:0;white-space:nowrap;font-size:.72em;padding:7px 9px}
  .mobile-panel{display:block;order:3;background:#111827;border-top:1px solid #1e293b;padding:8px 10px;max-height:35vh;overflow-y:auto;flex-shrink:0}
  .mobile-panel.collapsed{max-height:0;padding:0;overflow:hidden}
  .panel-toggle{display:flex;align-items:center;justify-content:center;gap:4px;padding:7px;background:#1a2332;color:#94a3b8;border:none;width:100%;font-size:.78em;cursor:pointer;order:4;flex-shrink:0}
}
@media(min-width:769px){.panel-toggle{display:none}}
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="canvas-wrap"><canvas id="canvas"></canvas></div>
<div class="mobile-tabs" id="mobileTabs"></div>
<div class="mobile-panel" id="mobilePanel"></div>
<button class="panel-toggle" id="panelToggle" onclick="togglePanel()">⚙ 速度控制</button>

<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const DESIGN_W=750,DESIGN_H=600;canvas.width=DESIGN_W;canvas.height=DESIGN_H;
let currentModel='halfangle',time=0,speed=1;const trails=[];
let panelOpen=true;
function togglePanel(){panelOpen=!panelOpen;document.getElementById('mobilePanel').classList.toggle('collapsed',!panelOpen);document.getElementById('panelToggle').textContent=panelOpen?'⚙ 速度控制':'⚙ 速度控制 ▸'}
function resizeCanvas(){const w=canvas.parentElement,sw=Math.min((w.clientWidth-8)/DESIGN_W,(w.clientHeight-8)/DESIGN_H);canvas.style.width=(DESIGN_W*sw)+'px';canvas.style.height=(DESIGN_H*sw)+'px'}
window.addEventListener('resize',resizeCanvas);
function addTrail(x,y){trails.push({x,y,life:1});if(trails.length>50)trails.shift()}
function drawTrails(){for(let t of trails){ctx.beginPath();ctx.arc(t.x,t.y,2,0,Math.PI*2);ctx.fillStyle=`rgba(251,191,36,${t.life*0.55})`;ctx.fill();t.life-=0.025}for(let i=trails.length-1;i>=0;i--)if(trails[i].life<=0)trails.splice(i,1)}
function glowPt(x,y,r,color){for(let i=3;i>=0;i--){ctx.beginPath();ctx.arc(x,y,r+i*5,0,Math.PI*2);ctx.fillStyle=color.replace('1',(0.1-i*0.02).toString());ctx.fill()}}
function dp(x,y,r,color,label,glow=false){if(glow)glowPt(x,y,r,color);ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();if(label){ctx.fillStyle='#f1f5f9';ctx.font='bold 13px sans-serif';ctx.fillText(label,x+10,y-10)}}
function dl(x1,y1,x2,y2,color,width=2,dashed=false){if(dashed)ctx.setLineDash([8,5]);else ctx.setLineDash([]);ctx.strokeStyle=color;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.setLineDash([])}
function fillTri(a,b,c,color){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(c.x,c.y);ctx.closePath();ctx.fill()}

function renderHalfAngle(){
  ctx.clearRect(0,0,DESIGN_W,DESIGN_H);let sX=195,sY=85,sS=370,A={x:sX,y:sY},B={x:sX+sS,y:sY},C={x:sX+sS,y:sY+sS},D={x:sX,y:sY+sS};
  let eP=0.13+Math.abs(Math.sin(time*0.5*speed))*0.7,fP=0.18+Math.sin(time*0.48*speed+1)*0.18,E={x:C.x,y:sY+sS*eP},F={x:sX+sS*fP,y:D.y};
  dl(A.x,A.y,B.x,B.y,'#475569',2);dl(B.x,B.y,C.x,C.y,'#475569',2);dl(C.x,C.y,D.x,D.y,'#475569',2);dl(D.x,D.y,A.x,A.y,'#475569',2);
  dl(A.x,A.y,E.x,E.y,'#60a5fa',3.5);dl(A.x,A.y,F.x,F.y,'#60a5fa',3.5);dl(E.x,E.y,F.x,F.y,'#34d399',3);
  let G={x:A.x-(F.y-A.y),y:A.y+(F.x-A.x)};dp(G.x,G.y,4,'#f472b6','G');dl(A.x,A.y,G.x,G.y,'#f472b6',1.5,true);
  let BE=C.y-E.y,DF=F.x-D.x,EF=Math.hypot(E.x-F.x,E.y-F.y),match=Math.abs(BE+DF-EF)<8;
  let aE=Math.atan2(E.y-A.y,E.x-A.x),aF=Math.atan2(F.y-A.y,F.x-A.x);ctx.beginPath();ctx.arc(A.x,A.y,48,aF,aE);ctx.strokeStyle='#fbbf24';ctx.lineWidth=3.5;ctx.stroke();
  ctx.fillStyle='#fbbf24';ctx.font='bold 15px sans-serif';ctx.fillText('45°',A.x+55*Math.cos((aF+aE)/2),A.y+55*Math.sin((aF+aE)/2)-10);
  dp(A.x,A.y,6,'#f8fafc','A');dp(B.x,B.y,5,'#f8fafc','B');dp(C.x,C.y,5,'#f8fafc','C');dp(D.x,D.y,5,'#f8fafc','D');dp(E.x,E.y,6,'#60a5fa','E',true);dp(F.x,F.y,6,'#60a5fa','F',true);
  ctx.fillStyle='#f1f5f9';ctx.font='bold 15px sans-serif';ctx.fillText('半角模型',20,28);ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText(`BE=${BE.toFixed(0)} DF=${DF.toFixed(0)}`,20,44);ctx.fillText(`BE+DF=${(BE+DF).toFixed(0)} EF=${EF.toFixed(0)}`,20,60);ctx.fillStyle=match?'#34d399':'#94a3b8';ctx.font='bold 13px sans-serif';ctx.fillText(match?'✓ EF=BE+DF ✓':'EF≈BE+DF',20,78);
}

function renderGuadou(){
  ctx.clearRect(0,0,DESIGN_W,DESIGN_H);let O={x:215,y:315},rM=135,P={x:515,y:315},sc=0.52,rot=Math.PI/3;
  let A={x:O.x+rM*Math.cos(time*0.6*speed),y:O.y+rM*Math.sin(time*0.6*speed)};
  let dx=A.x-P.x,dy=A.y-P.y,B={x:P.x+sc*(dx*Math.cos(rot)-dy*Math.sin(rot)),y:P.y+sc*(dx*Math.sin(rot)+dy*Math.cos(rot))};addTrail(B.x,B.y);drawTrails();
  ctx.beginPath();ctx.arc(O.x,O.y,rM,0,Math.PI*2);ctx.strokeStyle='#334155';ctx.lineWidth=2;ctx.stroke();
  let odx=O.x-P.x,ody=O.y-P.y,Op={x:P.x+sc*(odx*Math.cos(rot)-ody*Math.sin(rot)),y:P.y+sc*(odx*Math.sin(rot)+ody*Math.cos(rot))},rS=rM*sc;
  ctx.beginPath();ctx.arc(Op.x,Op.y,rS,0,Math.PI*2);ctx.strokeStyle='#f472b6';ctx.lineWidth=2.5;ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);
  dl(P.x,P.y,A.x,A.y,'#60a5fa',3);dl(P.x,P.y,B.x,B.y,'#f472b6',3);dl(A.x,A.y,B.x,B.y,'#475569',1,true);
  ctx.fillStyle='rgba(244,114,182,0.3)';for(let i=0;i<36;i++){let ang=i/36*Math.PI*2,tA={x:O.x+rM*Math.cos(ang),y:O.y+rM*Math.sin(ang)},tdx=tA.x-P.x,tdy=tA.y-P.y;ctx.beginPath();ctx.arc(P.x+sc*(tdx*Math.cos(rot)-tdy*Math.sin(rot)),P.y+sc*(tdx*Math.sin(rot)+tdy*Math.cos(rot)),2,0,Math.PI*2);ctx.fill()}
  let aA=Math.atan2(A.y-P.y,A.x-P.x),aB=Math.atan2(B.y-P.y,B.x-P.x);ctx.beginPath();ctx.arc(P.x,P.y,38,aB,aA);ctx.strokeStyle='#fbbf24';ctx.lineWidth=2.5;ctx.stroke();
  dp(O.x,O.y,4,'#64748b','O');dp(Op.x,Op.y,4,'#64748b',"O'");dp(P.x,P.y,6,'#f8fafc','P');dp(A.x,A.y,6,'#60a5fa','A',true);dp(B.x,B.y,7,'#f472b6','B',true);
  ctx.fillStyle='#f1f5f9';ctx.font='bold 15px sans-serif';ctx.fillText('瓜豆原理',20,28);ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('主动A→蓝圆,从动B→粉圆',20,44);ctx.fillText('✨ 轨迹形状相同',20,60);
}

function renderRotation(){
  ctx.clearRect(0,0,DESIGN_W,DESIGN_H);let O={x:375,y:325},rA=145,rB=125,bA=time*0.5*speed,fA=1.0;
  let A1={x:O.x+rA*Math.cos(bA),y:O.y+rA*Math.sin(bA)},B1={x:O.x+rB*Math.cos(bA+0.65),y:O.y+rB*Math.sin(bA+0.65)};
  let A2={x:O.x+rA*Math.cos(bA+fA),y:O.y+rA*Math.sin(bA+fA)},B2={x:O.x+rB*Math.cos(bA+fA+0.65),y:O.y+rB*Math.sin(bA+fA+0.65)};addTrail(A2.x,A2.y);drawTrails();
  fillTri(O,A1,B1,'rgba(96,165,250,0.1)');fillTri(O,A2,B2,'rgba(244,114,182,0.1)');
  dl(O.x,O.y,A1.x,A1.y,'#60a5fa',3.5);dl(O.x,O.y,B1.x,B1.y,'#60a5fa',3);dl(A1.x,A1.y,B1.x,B1.y,'#60a5fa',2.5);
  dl(O.x,O.y,A2.x,A2.y,'#f472b6',3.5);dl(O.x,O.y,B2.x,B2.y,'#f472b6',3);dl(A2.x,A2.y,B2.x,B2.y,'#f472b6',2.5);
  dl(A1.x,A1.y,A2.x,A2.y,'#fbbf24',2.5,true);dl(B1.x,B1.y,B2.x,B2.y,'#34d399',2.5,true);
  ctx.beginPath();ctx.arc(O.x,O.y,58,bA,bA+fA);ctx.strokeStyle='#f8fafc';ctx.lineWidth=2.5;ctx.stroke();
  ctx.fillStyle='#f8fafc';ctx.font='bold 13px sans-serif';ctx.fillText(`${(fA*180/Math.PI).toFixed(0)}°`,O.x+62*Math.cos(bA+fA/2),O.y+62*Math.sin(bA+fA/2)-8);
  dp(O.x,O.y,6,'#f8fafc','O');dp(A1.x,A1.y,5,'#60a5fa','A');dp(B1.x,B1.y,4,'#60a5fa','B');dp(A2.x,A2.y,6,'#f472b6',"A'",true);dp(B2.x,B2.y,5,'#f472b6',"B'");
  ctx.fillStyle='#f1f5f9';ctx.font='bold 15px sans-serif';ctx.fillText('旋转全等',20,28);ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('△OAB绕O旋转→△OA\'B\'',20,44);ctx.fillText('旋转不改变形状(全等)',20,60);
}

function render(){switch(currentModel){case'halfangle':renderHalfAngle();break;case'guadou':renderGuadou();break;case'rotation':renderRotation();break}}

function buildUI(){
  let models=[{id:'halfangle',n:'🔷 半角模型',sn:'半角'},{id:'guadou',n:'🫘 瓜豆原理',sn:'瓜豆'},{id:'rotation',n:'🔄 手拉手旋转',sn:'旋转'}];
  let st='<a href="index.html" class="back-link">← 返回首页</a><div style="display:flex;flex-direction:column;gap:4px">';
  models.forEach(m=>{st+=`<button class="tab-btn ${currentModel===m.id?'active':''}" data-m="${m.id}">${m.n}</button>`});
  st+=`</div><div class="ctrl"><h3>⚡ 速度</h3><input type="range" min="0.2" max="3" step="0.1" value="${speed}" class="speed-slider"><span style="font-size:.72em;color:#64748b"><span class="vd" class="vd speed-val">${speed.toFixed(1)}x</span></span></div>`;
  let infos={halfangle:'<b>半角模型</b><br>∠EAF=45°→旋转90°<br><span class="hl">EF=BE+DF</span>',guadou:'<b>瓜豆原理</b><br>主动点轨迹→从动点轨迹<br><span class="hl">形状相同</span>',rotation:'<b>旋转全等</b><br>共顶点等腰△旋转<br><span class="hl">对应边相等</span>'};
  st+=`<div class="info-box">${infos[currentModel]}</div>`;
  document.getElementById('sidebar').innerHTML=st;
  let mt='';models.forEach(m=>{mt+=`<button class="tab-btn ${currentModel===m.id?'active':''}" data-m="${m.id}">${m.sn}</button>`});
  document.getElementById('mobileTabs').innerHTML=mt;document.getElementById('mobilePanel').innerHTML=st;
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{currentModel=b.dataset.m;trails.length=0;buildUI();render()}));
  document.querySelectorAll('.speed-slider').forEach(sl=>sl.addEventListener('input',e=>{speed=+e.target.value;document.querySelectorAll('.speed-slider').forEach(s=>s.value=speed);document.querySelectorAll('.speed-val').forEach(s=>s.textContent=speed.toFixed(1))}));
}
resizeCanvas();buildUI();render();
function animate(ts){time=ts/1000;render();requestAnimationFrame(animate)}requestAnimationFrame(animate);
</script>
</body>
</html>
